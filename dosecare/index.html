<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>DoseCare - Support</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f7;
