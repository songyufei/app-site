<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Site</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        h1 { font-size: 2em; margin-bottom: 24px; }
        .apps { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .app-card {
            background: #fff;
            border-radius: 16px;
            padding: 32px 40px;
            text-decoration: none;
            color: #1d1d1f;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            transition: transform 0.2s;
        }
        .app-card:hover { transform: translateY(-4px); }
        .app-card h2 { font-size: 1.4em; margin-bottom: 8px; }
        .app-card p { color: #86868b; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>App Site</h1>
        <div class="apps">
            <a class="app-card" href="valt/">
                <h2>Valt</h2>
                <p>Privacy Policy & Terms of Use</p>
            </a>
        </div>
    </div>
</body>
</html>
